name: Browser configurator quality gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: browser-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  browsers:
    name: Cross-browser transaction and render checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LIBGL_ALWAYS_SOFTWARE: "1"
      PLAYWRIGHT_FIREFOX_HEADFUL: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install browser engines and system dependencies
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run browser quality suite
        run: xvfb-run --auto-servernum -- npm run test:browser

      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
