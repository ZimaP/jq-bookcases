name: Apply iOS third-party AR compatibility fix

on:
  push:
    branches:
      - codex/cabinet-ar-mvp

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: codex/cabinet-ar-mvp
          fetch-depth: 0

      - name: Patch iOS third-party browser AR support
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          ui_path = Path('cabinet-ar-ui.js')
          ui = ui_path.read_text()

          replacements = [
              (
                  '    this.arLaunchSucceeded = false;\n    this.slowTimer = 0;\n    this.analyticsMetadata = {};',
                  '    this.arLaunchSucceeded = false;\n    this.slowTimer = 0;\n    this.generatedUsdzUrl = "";\n    this.analyticsMetadata = {};'
              ),
              (
                  '''      if (modelResult.stale || this.destroyed || configurationHash !== this.currentConfigurationHash()) return;\n      await loadModelViewer();\n      if (modelResult.stale || this.destroyed || configurationHash !== this.currentConfigurationHash()) return;\n      window.clearTimeout(this.slowTimer);\n      this.loading = false;\n      this.setLaunchButtonLoading(false);\n      this.renderReady(configuration, modelResult.result, capability, shareUrl);\n      emitArAnalytics("ar_model_ready", { ...this.analyticsMetadata, deviceCategory: capability.deviceCategory, operatingSystem: capability.operatingSystem });''',
                  '''      if (modelResult.stale || this.destroyed || configurationHash !== this.currentConfigurationHash()) return;\n      await loadModelViewer();\n      if (modelResult.stale || this.destroyed || configurationHash !== this.currentConfigurationHash()) return;\n      let resolvedModel = modelResult.result;\n      if (capability.operatingSystem === "ios" && !capability.quickLook && !resolvedModel.usdzUrl) {\n        const generatedUsdzUrl = await prepareIosUsdz(resolvedModel.glbUrl);\n        if (generatedUsdzUrl) {\n          this.releaseGeneratedUsdz();\n          this.generatedUsdzUrl = generatedUsdzUrl;\n          resolvedModel = { ...resolvedModel, usdzUrl: generatedUsdzUrl };\n        }\n      }\n      if (modelResult.stale || this.destroyed || configurationHash !== this.currentConfigurationHash()) return;\n      window.clearTimeout(this.slowTimer);\n      this.loading = false;\n      this.setLaunchButtonLoading(false);\n      this.renderReady(configuration, resolvedModel, capability, shareUrl);\n      emitArAnalytics("ar_model_ready", { ...this.analyticsMetadata, deviceCategory: capability.deviceCategory, operatingSystem: capability.operatingSystem });'''
              ),
              (
                  '    this.setLaunchButtonLoading(false);\n    if (this.dialog?.open) {',
                  '    this.setLaunchButtonLoading(false);\n    this.releaseGeneratedUsdz();\n    if (this.dialog?.open) {'
              ),
              (
                  '    this.coordinator.destroy();\n    this.intersectionObserver?.disconnect();',
                  '    this.coordinator.destroy();\n    this.releaseGeneratedUsdz();\n    this.intersectionObserver?.disconnect();'
              ),
              (
                  '''    const remoteModel = model.source === "remote";\n    const available = capability.webXr || capability.quickLook || (remoteModel && capability.sceneViewer);''',
                  '''    const remoteModel = model.source === "remote";\n    const iosQuickLook = capability.quickLook || (capability.operatingSystem === "ios" && Boolean(model.usdzUrl));\n    if (iosQuickLook && !capability.quickLook) capability = { ...capability, quickLook: true, canLaunchAr: true };\n    const available = capability.webXr || capability.quickLook || (remoteModel && capability.sceneViewer);'''
              ),
              (
                  '''  get content() {\n    return this.dialog.querySelector("[data-ar-content]");\n  }''',
                  '''  releaseGeneratedUsdz() {\n    if (!this.generatedUsdzUrl) return;\n    URL.revokeObjectURL(this.generatedUsdzUrl);\n    this.generatedUsdzUrl = "";\n  }\n\n  get content() {\n    return this.dialog.querySelector("[data-ar-content]");\n  }'''
              ),
              (
                  '''function desktopHandoffMarkup(shareUrl) {''',
                  '''async function prepareIosUsdz(glbUrl) {\n  const viewer = document.createElement("model-viewer");\n  viewer.setAttribute("loading", "eager");\n  viewer.style.cssText = "position:fixed;left:-10000px;top:0;width:2px;height:2px;opacity:0;pointer-events:none;";\n  document.body.appendChild(viewer);\n  try {\n    const loaded = new Promise((resolve, reject) => {\n      const timeout = window.setTimeout(() => reject(new Error("USDZ preparation timed out.")), 20000);\n      viewer.addEventListener("load", () => { window.clearTimeout(timeout); resolve(); }, { once: true });\n      viewer.addEventListener("error", () => { window.clearTimeout(timeout); reject(new Error("USDZ source failed to load.")); }, { once: true });\n    });\n    viewer.src = glbUrl;\n    await loaded;\n    if (typeof viewer.prepareUSDZ !== "function") return null;\n    return await viewer.prepareUSDZ();\n  } catch (error) {\n    return null;\n  } finally {\n    viewer.remove();\n  }\n}\n\nfunction desktopHandoffMarkup(shareUrl) {'''
              )
          ]

          for old, new in replacements:
              if old not in ui:
                  raise SystemExit(f'Expected cabinet-ar-ui.js block not found:\n{old[:160]}')
              ui = ui.replace(old, new, 1)

          ui_path.write_text(ui)

          test_path = Path('tests/cabinet-ar.test.js')
          tests = test_path.read_text()
          old = '  assert.match(source, /data-ar-launch/);\n'
          new = '  assert.match(source, /data-ar-launch/);\n  assert.match(source, /prepareIosUsdz/);\n  assert.match(source, /prepareUSDZ/);\n  assert.match(source, /generatedUsdzUrl/);\n'
          if old not in tests:
              raise SystemExit('Expected AR UI test insertion point not found.')
          test_path.write_text(tests.replace(old, new, 1))

          workflow = Path('.github/workflows/fix-ios-third-party-ar.yml')
          workflow.unlink()
          PY

      - name: Validate fix
        run: |
          npm run build
          npm test

      - name: Commit compatibility fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cabinet-ar-ui.js tests/cabinet-ar.test.js .github/workflows/fix-ios-third-party-ar.yml
          git commit -m "Fix AR launch in iOS third-party browsers"
          git push origin HEAD:codex/cabinet-ar-mvp
