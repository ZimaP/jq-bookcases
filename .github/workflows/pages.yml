name: Deploy JQ Bookcases to GitHub Pages

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate JavaScript
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Install Chromium for the deployment gate
        run: npx playwright install --with-deps chromium

      - name: Run Chromium browser regression gate
        run: npm run test:browser -- --project=chromium

  publish-artifact:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir -p _site
          find . -maxdepth 1 -type f \
            \( -name '*.html' -o -name '*.css' -o -name '*.js' \) \
            ! -name 'playwright.config.js' \
            -exec cp '{}' _site/ \;
          cp -R assets styles _site/
          mkdir -p _site/data
          cp -R data/generated _site/data/
          touch _site/.nojekyll
          test -f _site/index.html
          test -f _site/configurator.html
          test -f _site/assets/vendor/three.module.js
          test -f _site/data/generated/benjamin-moore-colors.json
          test -f _site/styles/icons.css
          test ! -e _site/playwright.config.js
          test ! -e _site/package.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
          include-hidden-files: true

  deploy:
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: publish-artifact
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
