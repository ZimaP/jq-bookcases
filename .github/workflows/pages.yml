name: Deploy JQ Bookcases to GitHub Pages

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - codex/cabinet-ar-mvp
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: pages-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Validate JavaScript
        run: npm run build

      - name: Run tests
        run: npm test

  publish-artifact:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='_site/' \
            --exclude='node_modules/' \
            --exclude='tests/' \
            --exclude='scripts/' \
            --exclude='*.md' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            ./ _site/
          touch _site/.nojekyll
          test -f _site/index.html
          test -f _site/configurator.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
          include-hidden-files: true

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: publish-artifact
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report-preview:
    if: always() && github.event_name == 'push' && github.ref_name == 'codex/cabinet-ar-mvp'
    runs-on: ubuntu-latest
    needs:
      - validate
      - publish-artifact
      - deploy
    steps:
      - name: Report preview status on the pull request
        uses: actions/github-script@v9
        env:
          VALIDATION_RESULT: ${{ needs.validate.result }}
          PUBLISH_RESULT: ${{ needs.publish-artifact.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        with:
          script: |
            const marker = '<!-- jq-bookcases-pages-preview -->';
            const branch = context.ref.replace('refs/heads/', '');
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
              per_page: 20
            });
            const pull = pulls[0];
            if (!pull) {
              core.notice(`No open pull request found for ${branch}.`);
              return;
            }

            const validationResult = process.env.VALIDATION_RESULT || 'unknown';
            const publishResult = process.env.PUBLISH_RESULT || 'unknown';
            const deployResult = process.env.DEPLOY_RESULT || 'unknown';
            const successful = validationResult === 'success'
              && publishResult === 'success'
              && deployResult === 'success';
            const fallbackUrl = `https://${context.repo.owner.toLowerCase()}.github.io/${context.repo.repo}/`;
            const pageUrl = (process.env.PAGE_URL || fallbackUrl).trim();
            const normalizedPageUrl = pageUrl.endsWith('/') ? pageUrl : `${pageUrl}/`;
            const configuratorUrl = new URL('configurator.html', normalizedPageUrl).toString();
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let guidance = '';
            if (validationResult !== 'success') {
              guidance = 'The JavaScript validation or test suite failed. Open the workflow run for the failing command.';
            } else if (publishResult !== 'success') {
              guidance = 'The application passed validation, but GitHub rejected Pages configuration. In **Settings → Pages → Build and deployment**, set **Source** to **GitHub Actions**, then re-run this workflow.';
            } else if (deployResult !== 'success') {
              guidance = 'The Pages artifact was prepared, but GitHub rejected the deployment. Open the workflow run and check the `github-pages` environment.';
            }

            const body = successful
              ? `${marker}\n## iPad AR preview\n\n✅ GitHub Pages deployed successfully.\n\n- [Open the AR configurator](${configuratorUrl})\n- [Open the deployment run](${runUrl})\n\nOpen the configurator in Safari on the iPad, configure a cabinet, then select **View in Your Room**.`
              : `${marker}\n## iPad AR preview\n\n❌ GitHub Pages did not complete.\n\n- Application validation: \`${validationResult}\`\n- Pages artifact: \`${publishResult}\`\n- Pages deployment: \`${deployResult}\`\n- [Open the deployment run](${runUrl})\n\n${guidance}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pull.number,
              per_page: 100
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pull.number,
                body
              });
            }
