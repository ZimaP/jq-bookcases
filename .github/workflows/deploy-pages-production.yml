name: Deploy GitHub Pages — Manual Production Release
run-name: Deploy ${{ inputs.production_sha }} to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      production_sha:
        description: Full 40-character SHA selected by the production-* tag
        required: true
        type: string
      confirm_production:
        description: Type DEPLOY exactly to authorize production publication
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate the exact production commit
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.confirm_production == 'DEPLOY' && startsWith(github.ref, 'refs/tags/production-') }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout requested production commit
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.production_sha }}
          fetch-depth: 0

      - name: Require a selected commit contained in current main
        env:
          DISPATCH_SHA: ${{ github.sha }}
          PRODUCTION_SHA: ${{ inputs.production_sha }}
        run: |
          if [[ ! "$PRODUCTION_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "production_sha must be a full lowercase 40-character commit SHA" >&2
            exit 1
          fi
          test "$DISPATCH_SHA" = "$PRODUCTION_SHA"
          test "$(git rev-parse HEAD)" = "$PRODUCTION_SHA"
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$PRODUCTION_SHA" FETCH_HEAD
          echo "Validated production SHA: $PRODUCTION_SHA"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate workflow policy and JavaScript
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Install Chromium for production validation
        run: npx playwright install --with-deps chromium

      - name: Run Chromium browser regression gate
        run: npm run test:browser -- --project=chromium

  deploy-production:
    name: Publish the exact validated commit
    if: ${{ needs.validate-release.result == 'success' && github.event_name == 'workflow_dispatch' && inputs.confirm_production == 'DEPLOY' && startsWith(github.ref, 'refs/tags/production-') }}
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages-production-deploy
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate-release
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout requested production commit
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.production_sha }}
          fetch-depth: 0

      - name: Reconfirm main before publication
        env:
          DISPATCH_SHA: ${{ github.sha }}
          PRODUCTION_SHA: ${{ inputs.production_sha }}
        run: |
          if [[ ! "$PRODUCTION_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "production_sha must be a full lowercase 40-character commit SHA" >&2
            exit 1
          fi
          test "$DISPATCH_SHA" = "$PRODUCTION_SHA"
          test "$(git rev-parse HEAD)" = "$PRODUCTION_SHA"
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$PRODUCTION_SHA" FETCH_HEAD
          echo "Publishing validated production SHA: $PRODUCTION_SHA"
          {
            echo "### Production commit"
            echo
            echo "\`$PRODUCTION_SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Prepare static site
        run: |
          mkdir -p _site
          find . -maxdepth 1 -type f \
            \( -name '*.html' -o -name '*.css' -o -name '*.js' \) \
            ! -name 'playwright.config.js' \
            -exec cp '{}' _site/ \;
          cp -R assets styles _site/
          mkdir -p _site/data
          cp -R data/generated _site/data/
          cp -R data/hardware _site/data/
          touch _site/.nojekyll
          test -f _site/index.html
          test -f _site/configurator.html
          test -f _site/assets/vendor/three.module.js
          test -f _site/data/generated/benjamin-moore-colors.json
          test -f _site/data/hardware/jq-hardware-catalog.seed.json
          test -f _site/styles/icons.css
          test ! -e _site/playwright.config.js
          test ! -e _site/package.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site
          include-hidden-files: true

      - name: Deploy exact commit to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
