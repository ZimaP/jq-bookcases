name: Deploy AR preview

on:
  push:
    branches:
      - codex/cabinet-ar-mvp
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out preview branch
        uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p _site
          rsync -a --delete --exclude='.git' --exclude='node_modules' --exclude='artifacts' ./ _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
