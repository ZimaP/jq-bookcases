name: Engine quality gate

on:
  push:
    branches:
      - main
      - engine-hardening-supervisor
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: engine-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-engine:
    name: Syntax, unit, matrix, and fuzz tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Print runtime versions
        run: |
          node --version
          npm --version

      - name: Validate JavaScript syntax
        run: npm run build

      - name: Run complete test suite
        run: npm test

  apply-transaction:
    name: Apply atomic configurator integration
    if: github.event_name == 'pull_request' && github.head_ref == 'engine-hardening-supervisor'
    needs: node-engine
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: engine-hardening-supervisor
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Apply deterministic source patch
        run: node scripts/apply-configurator-transaction.mjs

      - name: Verify patched application
        run: |
          npm run build
          npm test
          git diff --check

      - name: Commit patched source
        run: |
          if git diff --quiet; then
            echo "No source changes were produced."
            exit 0
          fi
          git config user.name "JQ Engine Supervisor"
          git config user.email "actions@users.noreply.github.com"
          git add configurator-3d.js site.js bookcase-bom.js
          git commit -m "Make configurator updates atomic and persistence versioned"
          git push origin HEAD:engine-hardening-supervisor
