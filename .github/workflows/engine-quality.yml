name: Engine quality gate

on:
  push:
    branches:
      - main
      - engine-hardening-supervisor
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: engine-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-engine:
    name: Syntax, unit, matrix, and fuzz tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Print runtime versions
        run: |
          node --version
          npm --version

      - name: Validate JavaScript syntax
        run: npm run build

      - name: Run complete test suite
        run: npm test
