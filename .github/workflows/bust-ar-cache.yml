name: Refresh AR compatibility assets

on:
  push:
    branches:
      - codex/cabinet-ar-mvp

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: codex/cabinet-ar-mvp
          fetch-depth: 0
      - name: Refresh AR module versions
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('configurator-3d.js')
          source = path.read_text()
          old = 'cabinet-ar-20260712a'
          if old not in source:
              raise SystemExit('Expected AR asset version was not found.')
          path.write_text(source.replace(old, 'cabinet-ar-20260712b'))
          Path('.github/workflows/bust-ar-cache.yml').unlink()
          PY
          npm run build
          npm test
      - name: Commit refreshed asset references
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add configurator-3d.js .github/workflows/bust-ar-cache.yml
          git commit -m "Refresh AR compatibility assets"
          git push origin HEAD:codex/cabinet-ar-mvp
