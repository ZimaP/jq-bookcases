name: Apply configurator transaction patch

on:
  push:
    branches:
      - engine-hardening-supervisor
    paths:
      - scripts/apply-configurator-transaction.mjs
      - .github/workflows/apply-configurator-transaction.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out hardening branch
        uses: actions/checkout@v4
        with:
          ref: engine-hardening-supervisor
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Apply deterministic source patch
        run: node scripts/apply-configurator-transaction.mjs

      - name: Verify syntax and tests
        run: |
          npm run build
          npm test
          git diff --check

      - name: Commit patched application files
        run: |
          if git diff --quiet; then
            echo "No source changes were produced."
            exit 0
          fi
          git config user.name "JQ Engine Supervisor"
          git config user.email "actions@users.noreply.github.com"
          git add configurator-3d.js site.js bookcase-bom.js
          git commit -m "Make configurator updates atomic and persistence versioned"
          git push origin HEAD:engine-hardening-supervisor
